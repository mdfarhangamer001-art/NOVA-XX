Name: NOVA-X Single EXE Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Fix Rollup Dependency
        run: npm install @rollup/rollup-win32-x64-msvc --save-dev

      - name: Sync package.json version with Release Tag
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = '1.0.${{ github.run_number }}'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2), 'utf8');"
        shell: bash

      - name: Build NOVA-X Installer
        run: npm run dist:win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA-X v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/*.exe

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
