name: NOVA-X Single EXE Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache electron-builder assets
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund
        shell: bash

      - name: Sync package.json version
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = '1.0.${{ github.run_number }}'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2), 'utf8');"
        shell: bash

      - name: Build NOVA-X Installer
        run: npm run dist:win

      - name: Report exact build size
        run: |
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object {
            "$($_.Name): $($_.Length) bytes ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }
        shell: pwsh

      - name: Configure Git & Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v1.0.${{ github.run_number }}
          git push origin v1.0.${{ github.run_number }}
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA-X v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
