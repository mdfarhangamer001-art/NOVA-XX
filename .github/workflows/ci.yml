name: CI Build & Release

on:
  push:
    branches: ['main']
    tags:
      - 'v*'
  pull_request:
    branches: ['main']

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: [22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxrender-dev libmacaroons-dev libsodium-dev

      - name: Remove Old Lockfile & Install Clean Dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      # OS ke hisab se Electron Exe/Installer banane ke liye:
      - name: Compile & Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win

      - name: Compile & Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac

      - name: Compile & Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets-${{ matrix.os }}
          path: dist/
          compression-level: 0

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('release-{0}', github.run_number) }}
          name: Automatic Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
