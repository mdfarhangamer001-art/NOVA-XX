name: CI Build & Lint

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # IRIS runs natively on Windows, macOS, and Ubuntu
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: [22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxrender-dev libmacaroons-dev libsodium-dev

      - name: Install Dependencies
        run: npm install

      - name: Compile & Build
        run: npm run build

      - name: Verify Build
        run: ls -la out
        shell: bash
