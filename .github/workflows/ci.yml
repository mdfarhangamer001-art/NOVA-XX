name: CI Build & Lint

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # IRIS / NOVA-X runs natively on Windows, macOS, and Ubuntu
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: [22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libx11-dev libxext-dev libxrender-dev libasound2-dev libsodium-dev libgbm-dev libnss3-dev libgtk-3-dev

      - name: Install Dependencies
        run: npm install

      - name: Check Code Quality & Lint
        run: npm run lint

      - name: Compile & Build
        run: npm run build

      - name: Verify Build Output
        run: |
          ls -la out
          ls -la dist
        shell: bash
